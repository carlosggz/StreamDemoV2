spring:
  application:
    name: rabbit-stream-consumer
  cloud:
    function:
      definition: personsInputChannel;othersInputChannel;allInputChannel
    stream:
      defaultBinder: rabbit
      bindings:
        personsInputChannel-in-0:
          destination: persons-topic
          group: group1
          consumer:
            concurrency: 5
            max-attempts: 3
        othersInputChannel-in-0:
          destination: persons-topic
          group: group2
          consumer:
            concurrency: 5
            max-attempts: 3
        allInputChannel-in-0:
          destination: persons-topic
          group: group3
          consumer:
            concurrency: 5
            max-attempts: 3
      rabbit:
        bindings:
          personsInputChannel-in-0:
            consumer:
              durableSubscription: false
              autoBindDlq: true
              republishToDlq: false
              requeueRejected: true
              transacted: true
              bindingRoutingKey: first.*.key,third.*.key
              bindingRoutingKeyDelimiter: ','
          othersInputChannel-in-0:
            consumer:
              durableSubscription: false
              autoBindDlq: true
              republishToDlq: false
              requeueRejected: true
              transacted: true
              bindingRoutingKey: second.*.key
          allInputChannel-in-0:
            consumer:
              durableSubscription: false
              autoBindDlq: true
              republishToDlq: false
              requeueRejected: true
              transacted: true
              bindingRoutingKey: "*.*.key"
  rabbitmq:
    username: myuser
    password: mypass
    host: localhost
    port: 5672

server:
  port: 8081