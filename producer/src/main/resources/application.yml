spring:
  application:
    name: rabbit-stream-producer
  cloud:
    function:
      definition: first;second;third
    stream:
      defaultBinder: rabbit
      bindings:
        first-out-0:
          destination: persons-topic
          content-type: application/json
        second-out-0:
          destination: persons-topic
          content-type: application/json
        third-out-0:
          destination: persons-topic
          content-type: application/json
      rabbit:
        bindings:
          first-out-0:
            producer:
              transacted: true
              routing-key-expression: headers.myRoutingKey
              exchangeType: topic
          second-out-0:
            producer:
              transacted: true
              routing-key-expression: headers.myRoutingKey
              exchangeType: topic
          third-out-0:
            producer:
              transacted: true
              routing-key-expression: headers.myRoutingKey
              exchangeType: topic
  rabbitmq:
    username: myuser
    password: mypass
    host: localhost
    port: 5672

server:
  port: 8082